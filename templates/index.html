<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Giveaway 🎁</title>
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>
    <style>
        :root {
            --primary: #00d4ff;
            --secondary: #0055ff;
            --bg: #050510;
            --card-bg: rgba(255, 255, 255, 0.05);
            --error: #ff4b2b;
        }

        body {
            background: var(--bg);
            background: radial-gradient(circle at top right, #1a1a3a, #050510);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* ფონის ანიმაციური ბურთები დიზაინისთვის */
        .bg-circle {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--secondary);
            filter: blur(100px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.2;
            animation: move 10s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-50%, -50%); }
            to { transform: translate(50%, 50%); }
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            transform: translateY(0);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        h2 {
            font-size: 28px;
            margin-bottom: 10px;
            background: linear-gradient(to right, var(--primary), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        p.subtitle {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .input-group {
            position: relative;
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 12px;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s;
            font-size: 15px;
        }

        input:focus {
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(45deg, var(--secondary), var(--primary));
            border: none;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            border-radius: 12px;
            margin-top: 10px;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0, 85, 255, 0.3);
        }

        button:hover {
            opacity: 0.9;
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(0, 212, 255, 0.4);
        }

        button:disabled {
            background: #444;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        #msg {
            margin-top: 20px;
            font-size: 14px;
            min-height: 20px;
            font-weight: 500;
        }

        .success { color: #00ff88; }
        .error { color: var(--error); }

        /* ბლოკირების ეკრანის დიზაინი */
        .blocked-container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 75, 43, 0.1);
            border: 1px solid var(--error);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <div class="bg-circle"></div>
    
    <div class="card" id="main-card">
        <h2>გათამაშება 🎁</h2>
        <p class="subtitle">შეავსეთ მონაცემები მონაწილეობისთვის</p>
        
        <div class="input-group">
            <input type="text" id="name" placeholder="სახელი გვარი" autocomplete="off">
        </div>
        <div class="input-group">
            <input type="text" id="discord" placeholder="Discord Tag (მაგ: user#0000)" autocomplete="off">
        </div>
        <div class="input-group">
            <input type="text" id="steam" placeholder="Steam პროფილის სახელი" autocomplete="off">
        </div>
        
        <button id="reg-btn" onclick="send()">რეგისტრაცია</button>
        <p id="msg"></p>
    </div>

    <script>
        // VPN და Timezone შემოწმება
        async function checkVPN() {
            const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
            
            // 1. Timezone შემოწმება
            if (tz !== "Asia/Tbilisi" "Europe/Athens") {
                blockUser("თქვენი დროის სარტყელი არასწორია. გთხოვთ გამორთოთ VPN.");
                return;
            }

            try {
                // 2. IP შემოწმება
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                
                if (data.country !== "GE") {
                    blockUser("წვდომა შეზღუდულია. რეგისტრაცია შესაძლებელია მხოლოდ საქართველოდან.");
                }
            } catch (e) {
                console.warn("IP Check bypassed due to connection error.");
            }
        }

        function blockUser(message) {
            document.body.innerHTML = `
                <div class="blocked-container">
                    <h1 style="color:var(--error); margin-bottom:10px;">წვდომა უარყოფილია! 🛑</h1>
                    <p style="margin-bottom:20px;">${message}</p>
                    <button style="width:auto; padding: 12px 30px;" onclick="location.reload()">განახლება</button>
                </div>`;
        }

        // გაშვება ჩატვირთვისას
        checkVPN();

        async function send() {
            const name = document.getElementById('name').value.trim();
            const discord = document.getElementById('discord').value.trim();
            const steam = document.getElementById('steam').value.trim();
            const msgObj = document.getElementById('msg');
            const btn = document.getElementById('reg-btn');

            // ვალიდაცია
            if (!name || !discord || !steam) {
                msgObj.innerText = "გთხოვთ შეავსოთ ყველა ველი!";
                msgObj.className = "error";
                return;
            }

            btn.disabled = true;
            btn.innerText = "მუშავდება...";
            msgObj.innerText = "";

            try {
                const fpLoad = await FingerprintJS.load();
                const fp = await fpLoad.get();
                
                const res = await fetch('/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        full_name: name,
                        discord_tag: discord,
                        steam_name: steam,
                        fingerprint: fp.visitorId
                    })
                });
                
                const data = await res.json();
                msgObj.innerText = data.message;
                
                if(data.status === "success") {
                    msgObj.className = "success";
                    btn.innerText = "მზადაა!";
                    // ფორმის გასუფთავება
                    document.querySelectorAll('input').forEach(i => i.disabled = true);
                } else {
                    msgObj.className = "error";
                    btn.disabled = false;
                    btn.innerText = "რეგისტრაცია";
                }
            } catch (err) {
                msgObj.innerText = "კავშირის შეცდომა. სცადეთ მოგვიანებით.";
                msgObj.className = "error";
                btn.disabled = false;
                btn.innerText = "რეგისტრაცია";
            }
        }
    </script>
</body>
</html>
